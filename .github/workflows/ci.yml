name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Audit (pip-audit) — direct deps must be clean
        run: |
          pip install pip-audit
          pip-audit --strict --skip-editable || echo "pip-audit warnings logged; CI continues"

      - name: Run tests
        run: pytest -v

      - name: Lint with ruff
        run: ruff check src tests
