# AgentScope — Splunk Saved Searches (the 5 hackathon dashboards)
#
# Index assumed: agentscope
# Sourcetype: agentscope:toolcall

[agentscope_live_stream]
search = index=agentscope sourcetype="agentscope:toolcall" | head 100 | table _time agent tool status duration_ms
description = Live stream of the last 100 tool calls across every agent.
dispatch.earliest_time = -15m
is_visible = true

[agentscope_tool_volume_by_service]
search = index=agentscope sourcetype="agentscope:toolcall" | timechart span=5m count by tool
description = Tool-call volume over time, split by tool name.
dispatch.earliest_time = -24h
is_visible = true

[agentscope_error_funnel]
search = index=agentscope sourcetype="agentscope:toolcall" status=error | stats count by error_class tool | sort - count
description = Top error classes and which tools surface them.
dispatch.earliest_time = -24h
is_visible = true

[agentscope_token_cost_waterfall]
search = index=agentscope sourcetype="agentscope:toolcall" | stats sum(cost_usd) as total_cost sum(input_tokens) as in_tok sum(output_tokens) as out_tok by agent | sort - total_cost
description = Per-agent dollar burn — input vs output tokens.
dispatch.earliest_time = -24h
is_visible = true

[agentscope_anomaly_high_risk]
search = index=agentscope sourcetype="agentscope:toolcall" (tool="rm_rf" OR tool="git_push_force" OR tool="drop_table") | timechart span=10m count
description = Spike detection on high-risk tool names. Alert if count > 10 in any 10m window.
dispatch.earliest_time = -24h
is_visible = true
